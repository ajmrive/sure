default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 3 } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { "5432" } %>
  user: <%= ENV.fetch("POSTGRES_USER") { nil } %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD") { nil } %>

development:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "sure_development" } %>

test:
  <<: *default
  # IMPORTANT: decoupled from POSTGRES_DB on purpose. POSTGRES_DB is shared by
  # development/production and is set to the real database in the Docker setup
  # (compose.dev.yml). If the test env also read POSTGRES_DB, running the test
  # suite would truncate the real database. Tests always use sure_test unless
  # POSTGRES_TEST_DB is explicitly set.
  database: <%= ENV.fetch("POSTGRES_TEST_DB") { "sure_test" } %>

production:
  <<: *default
  database: <%= ENV.fetch("POSTGRES_DB") { "sure_production" } %>
