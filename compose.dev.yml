# ===========================================================================
# Development Docker Compose — mounts local code for live changes
# ===========================================================================
#
# Usage:
#   docker compose -f compose.dev.yml up --build
#
# First-time setup (run once):
#   docker compose -f compose.dev.yml run --rm web bin/setup
#
# To stop:
#   docker compose -f compose.dev.yml down
#

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-sure_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sure_password}
  POSTGRES_DB: ${POSTGRES_DB:-sure_production}

x-rails-env: &rails_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:-a7523c3d0ae56415046ad8abae168d71074a79534a7062258f8d1d51ac2f76d3c3bc86d86b6b0b307df30d9a6a90a2066a3fa9e67c5e6f374dbd7dd4e0778e13}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: "false"
  RAILS_ENV: development
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  BUNDLE_PATH: /bundle
  HOST: "0.0.0.0"
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}

services:
  web:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - bundle_cache:/bundle
      - app-storage:/workspace/storage
    ports:
      # Bind to loopback only so the app isn't reachable from the LAN.
      - 127.0.0.1:${PORT:-4000}:3000
    restart: "no"
    working_dir: /workspace
    command: bin/dev
    environment:
      <<: *rails_env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - sure_net
    tty: true
    stdin_open: true

  worker:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
      - bundle_cache:/bundle
      - app-storage:/workspace/storage
    restart: "no"
    working_dir: /workspace
    command: bundle exec sidekiq
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      <<: *rails_env
    networks:
      - sure_net

  db:
    image: mirror.gcr.io/library/postgres:16
    restart: "no"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

  redis:
    image: mirror.gcr.io/library/redis:latest
    restart: "no"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

volumes:
  app-storage:
  postgres-data:
  redis-data:
  bundle_cache:

networks:
  sure_net:
    driver: bridge
